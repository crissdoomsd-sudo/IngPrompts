<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>promptforge.sh</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-black: #0a0a0a;
            --text-white: #e0e0e0;
            --text-gray: #888888;
            --green-ok: #4ec9b0;
            --amber-warn: #d7ba7d;
            --red-error: #f44747;
            --cyan-acce: #9cdcfe;
            --yellow-text: #dcdcaa;
        }

        html, body {
            height: 100%;
            overflow: hidden;
        }

        body {
            font-family: 'JetBrains Mono', 'Fira Code', 'Consolas', 'Courier New', monospace;
            background: var(--bg-black);
            color: var(--text-white);
            font-size: 14px;
            line-height: 1.5;
        }

        /* Terminal Container */
        .terminal {
            display: flex;
            flex-direction: column;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
        }

        /* Status Bar */
        .status-bar {
            background: rgba(255, 255, 255, 0.03);
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            padding: 8px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 13px;
            flex-shrink: 0;
        }

        .status-left {
            color: var(--cyan-acce);
        }

        .status-right {
            color: var(--text-gray);
            display: flex;
            gap: 20px;
        }

        .status-right span {
            opacity: 0.8;
        }

        .status-highlight {
            color: var(--amber-warn);
        }

        .status-time {
            color: var(--text-gray);
            font-variant-numeric: tabular-nums;
        }

        /* Output Area */
        .output-area {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            padding: 16px 20px;
            scroll-behavior: smooth;
        }

        .output-area::-webkit-scrollbar {
            width: 8px;
        }

        .output-area::-webkit-scrollbar-track {
            background: transparent;
        }

        .output-area::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.15);
            border-radius: 0;
        }

        .output-area::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.25);
        }

        /* Boot Messages */
        .boot-line {
            margin: 2px 0;
            white-space: pre-wrap;
        }

        .boot-ok {
            color: var(--green-ok);
        }

        .boot-warn {
            color: var(--amber-warn);
        }

        /* Box/Border Style */
        .term-box {
            border: 1px solid rgba(255, 255, 255, 0.15);
            padding: 16px 20px;
            margin: 20px 0;
            position: relative;
        }

        .term-box::before,
        .term-box::after {
            content: '';
            position: absolute;
            width: 8px;
            height: 8px;
            border-color: rgba(255, 255, 255, 0.15);
            border-style: solid;
        }

        .term-box::before {
            top: -1px;
            left: -1px;
            border-width: 2px 0 0 2px;
        }

        .term-box::after {
            bottom: -1px;
            right: -1px;
            border-width: 0 2px 2px 0;
        }

        .box-title {
            color: var(--amber-warn);
            font-weight: 500;
            margin-bottom: 12px;
        }

        .box-content {
            color: var(--text-white);
            line-height: 1.8;
        }

        .box-content p {
            margin: 6px 0;
        }

        .cmd-hint {
            color: var(--yellow-text);
        }

        /* Input Line */
        .input-line {
            display: flex;
            align-items: center;
            padding: 12px 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            background: rgba(0, 0, 0, 0.3);
            flex-shrink: 0;
        }

        .prompt-prefix {
            color: var(--cyan-acce);
            margin-right: 8px;
            white-space: nowrap;
            user-select: none;
        }

        .prompt-user {
            color: var(--green-ok);
        }

        .prompt-path {
            color: var(--text-gray);
        }

        .prompt-symbol {
            color: var(--text-white);
            margin-right: 10px;
        }

        .terminal-input {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: var(--text-white);
            font-family: inherit;
            font-size: inherit;
            caret-color: var(--green-ok);
        }

        .terminal-input::placeholder {
            color: rgba(255, 255, 255, 0.2);
        }

        /* Output Lines */
        .output-line {
            margin: 3px 0;
            white-space: pre-wrap;
            word-break: break-word;
        }

        .line-error {
            color: var(--red-error);
        }

        .line-success {
            color: var(--green-ok);
        }

        .line-info {
            color: var(--cyan-acce);
        }

        .line-warn {
            color: var(--amber-warn);
        }

        .line-dim {
            color: var(--text-gray);
        }

        .line-cmd {
            color: var(--yellow-text);
        }

        /* Help/Man Page Style */
        .man-page {
            margin: 16px 0;
        }

        .man-section {
            margin: 14px 0;
        }

        .man-title {
            color: var(--cyan-acce);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            font-size: 13px;
            margin-bottom: 8px;
            font-weight: 500;
        }

        .man-content {
            color: var(--text-white);
            padding-left: 0;
            line-height: 1.7;
        }

        .man-content code {
            color: var(--yellow-text);
            background: rgba(255, 255, 255, 0.05);
            padding: 2px 5px;
            font-family: inherit;
        }

        /* Generated Prompt Display */
        .prompt-output {
            border: 1px solid rgba(78, 201, 176, 0.3);
            background: rgba(78, 201, 176, 0.03);
            padding: 16px;
            margin: 16px 0;
            font-size: 13px;
            line-height: 1.7;
            color: var(--cyan-acce);
            position: relative;
        }

        .prompt-output::before {
            content: '[ OUTPUT ]';
            position: absolute;
            top: -10px;
            left: 12px;
            background: var(--bg-black);
            padding: 0 6px;
            font-size: 11px;
            color: var(--text-gray);
            letter-spacing: 1px;
        }

        /* Cursor */
        .cursor-block {
            display: inline-block;
            width: 8px;
            height: 17px;
            background: var(--green-ok);
            animation: blink-cursor 1s step-end infinite;
            vertical-align: middle;
            margin-left: 2px;
        }

        @keyframes blink-cursor {
            0%, 50% { opacity: 1; }
            51%, 100% { opacity: 0; }
        }

        /* Selection */
        ::selection {
            background: var(--green-ok);
            color: var(--bg-black);
        }

        /* Responsive */
        @media (max-width: 768px) {
            body {
                font-size: 13px;
            }

            .status-bar {
                padding: 6px 12px;
                font-size: 11px;
                flex-wrap: wrap;
                gap: 8px;
            }

            .status-right {
                gap: 10px;
                font-size: 10px;
            }

            .output-area {
                padding: 12px;
            }

            .input-line {
                padding: 10px 12px;
            }

            .term-box {
                padding: 12px 14px;
                margin: 14px 0;
            }
        }

        /* Hidden utility */
        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>
    <div class="terminal">
        <!-- Status Bar -->
        <div class="status-bar">
            <span class="status-left">user@promptforge <span style="color:var(--text-gray)">pmd:</span> ~</span>
            <span class="status-right">
                <span>theme: <span class="status-highlight">amber</span></span>
                <span>crt: <span class="status-highlight">on</span></span>
                <span>sound: off</span>
                <span class="status-time" id="clock">00:00:00</span>
            </span>
        </div>

        <!-- Terminal Output -->
        <div class="output-area" id="outputArea">
            <!-- Content loaded via JS -->
        </div>

        <!-- Input -->
        <div class="input-line">
            <span class="prompt-prefix">
                <span class="prompt-user">user</span>@<span class="prompt-user">promptforge</span>:<span class="prompt-path">~</span><span class="prompt-symbol">$</span>
            </span>
            <input 
                type="text" 
                class="terminal-input" 
                id="cmdInput"
                placeholder=""
                autocomplete="off"
                spellcheck="false"
                autofocus
            >
            <span class="cursor-block"></span>
        </div>
    </div>

    <script>
        // =============================================
        // STATE
        // =============================================
        const state = {
            step: 1,
            totalSteps: 5,
            questionsCount: 0,
            promptsCreated: 0,
            data: {
                objective: '',
                context: '',
                audience: '',
                format: '',
                tone: '',
                constraints: [],
                examples: ''
            },
            savedPrompts: JSON.parse(localStorage.getItem('pf_prompts') || '[]'),
            currentPrompt: '',
            history: []
        };

        // =============================================
        // BOOT SEQUENCE
        // =============================================
        const bootMessages = [
            { type: 'ok', text: '[ OK ] promptforge.sh v3.1.0 starting...' },
            { type: 'ok', text: '[ OK ] loading prompt engineering modules' },
            { type: 'ok', text: '[ OK ] mounting /prompts (' + state.savedPrompts.length + ' entries)' },
            { type: 'ok', text: '[ OK ] mounting /templates (12 templates)' },
            { type: 'ok', text: '[ OK ] initializing ai subsystem [amber]' },
            { type: 'warn', text: "[ WARN ] clipboard subsystem inactive (type 'save' to enable)" },
            { type: 'ok', text: '[ OK ] reading history (' + state.questionsCount + ' commands)' }
        ];

        const welcomeBox = `
<div class="term-box">
    <div class="box-title">promptforge.sh — a robust prompt generator that thinks it is a terminal.</div>
    <div class="box-content">
        <p>type <span class="cmd-hint">help</span> to see commands.</p>
        <p>type <span class="cmd-hint">ls</span> to look around.</p>
        <p>type <span class="cmd-hint">new</span> or just start typing to begin.</p>
        <p>type <span class="cmd-hint">cat README.md</span> for fun.</p>
    </div>
</div>`;

        // =============================================
        // QUESTIONS FLOW
        // =============================================
        const flow = [
            {
                step: 1,
                ask: () => print(`<div class="man-section"><div class="man-title">// STEP 01 — OBJECTIVE</div><div class="man-content">What is the <strong>primary objective</strong> of your prompt?<br><br>Be specific about:<br>• What should the AI do exactly?<br>• What result do you expect?<br>• What will you use this prompt for?</div></div>`)
            },
            {
                step: 2,
                ask: () => print(`<div class="man-section"><div class="man-title">// STEP 02 — CONTEXT & AUDIENCE</div><div class="man-content">Define the context and target audience:<br><br>• Who is the audience? (age, expertise level, interests)<br>• What background info should the AI know?<br>• Any specific domain or field?</div></div>`)
            },
            {
                step: 3,
                ask: () => print(`<div class="man-section"><div class="man-title">// STEP 03 — FORMAT & STYLE</div><div class="man-content">Specify output format and tone:<br><br>• Format: list, paragraphs, code, table, json...<br>• Tone: formal, casual, technical, persuasive...<br>• Any specific writing style?</div></div>`)
            },
            {
                step: 4,
                ask: () => print(`<div class="man-section"><div class="man-title">// STEP 04 — CONSTRAINTS</div><div class="man-content">Set limitations and final details:<br><br>• Max/min length<br>• Words or concepts to avoid<br>• Examples for reference<br>• Special instructions</div></div>`)
            },
            {
                step: 5,
                action: 'generate'
            }
        ];

        // =============================================
        // INITIALIZATION
        // =============================================
        document.addEventListener('DOMContentLoaded', () => {
            bootSequence();
            startClock();
            
            document.getElementById('cmdInput').addEventListener('keydown', e => {
                if (e.key === 'Enter') execute();
            });
        });

        function bootSequence() {
            const output = document.getElementById('outputArea');
            let i = 0;

            function showNext() {
                if (i < bootMessages.length) {
                    const msg = bootMessages[i];
                    const cls = msg.type === 'ok' ? 'boot-ok' : 'boot-warn';
                    appendLine(`<span class="${cls}">${msg.text}</span>`, 'boot-line');
                    i++;
                    setTimeout(showNext, 80 + Math.random() * 60);
                } else {
                    setTimeout(() => {
                        appendLine(welcomeBox);
                        appendLine('');
                        flow[0].ask();
                        scrollToBottom();
                    }, 300);
                }
            }

            showNext();
        }

        function startClock() {
            function update() {
                const now = new Date();
                const h = String(now.getHours()).padStart(2, '0');
                const m = String(now.getMinutes()).padStart(2, '0');
                const s = String(now.getSeconds()).padStart(2, '0');
                document.getElementById('clock').textContent = `${h}:${m}:${s}`;
            }
            update();
            setInterval(update, 1000);
        }

        // =============================================
        // CORE FUNCTIONS
        // =============================================
        function execute() {
            const input = document.getElementById('cmdInput');
            const cmd = input.value.trim();
            if (!cmd) return;

            // Show command
            appendLine(`<span class="prompt-prefix"><span class="prompt-user">user</span>@<span class="prompt-user">promptforge</span>:<span class="prompt-path">~</span><span class="prompt-symbol">$</span></span>${escapeHtml(cmd)}`);
            
            state.history.push(cmd);
            state.questionsCount++;

            input.value = '';

            // Process
            processCommand(cmd);
            scrollToBottom();
        }

        function processCommand(cmd) {
            const c = cmd.toLowerCase().trim();

            // System commands
            if (c === 'help' || c === '--help' || c === '-h') {
                showHelp();
                return;
            }
            if (c === 'clear' || c === 'cls') {
                clearScreen();
                return;
            }
            if (c === 'new' || c === 'reset') {
                newSession();
                return;
            }
            if (c === 'ls' || c === 'dir') {
                listFiles();
                return;
            }
            if (c === 'cat readme.md' || c === 'readme') {
                showReadme();
                return;
            }
            if (c === 'save') {
                savePrompt();
                return;
            }
            if (c === 'list' || c === 'saved') {
                listSaved();
                return;
            }
            if (c === 'export') {
                exportAll();
                return;
            }
            if (c === 'copy' || c === 'cp') {
                copyPrompt();
                return;
            }
            if (c === 'download' || c === 'dl') {
                downloadPrompt();
                return;
            }
            if (c === 'about' || c === 'version' || c === '-v') {
                showAbout();
                return;
            }
            if (c.startsWith('load ') || c.startsWith('open ')) {
                loadPrompt(c.split(' ')[1]);
                return;
            }
            if (c === '' || c === 'exit' || c === 'quit') {
                appendLine('<span class="line-dim">use Ctrl+W to close this tab. or just stay forever.</span>');
                return;
            }

            // Treat as answer to current question
            handleAnswer(cmd);
        }

        function handleAnswer(answer) {
            switch(state.step) {
                case 1:
                    state.data.objective = answer;
                    break;
                case 2:
                    state.data.context = answer;
                    break;
                case 3:
                    state.data.format = answer;
                    break;
                case 4:
                    state.data.constraints.push(answer);
                    break;
            }

            if (state.step < state.totalSteps) {
                state.step++;
                flow[state.step - 1].ask();
            } else {
                generatePrompt();
            }
        }

        function generatePrompt() {
            const d = state.data;
            
            let prompt = `# ROLE\n`;
            prompt += `You are an expert AI assistant specialized in: ${d.objective}\n\n`;
            prompt += `# OBJECTIVE\n${d.objective}\n\n`;
            
            if (d.context) {
                prompt += `# CONTEXT & AUDIENCE\n${d.context}\n\n`;
            }
            
            if (d.format) {
                prompt += `# FORMAT & STYLE\nFormat: ${d.format}\n\n`;
            }
            
            if (d.constraints.length > 0) {
                prompt += `# CONSTRAINTS\n`;
                d.constraints.forEach(c => prompt += `- ${c}\n`);
                prompt += `\n`;
            }
            
            prompt += `# EXECUTION PROTOCOL\n`;
            prompt += `1. Analyze the request thoroughly\n`;
            prompt += `2. Consider all provided context\n`;
            prompt += `3. Generate output following specifications\n`;
            prompt += `4. Verify against constraints\n`;
            prompt += `5. Deliver polished result\n\n`;
            prompt += `--- Execute now ---`;

            state.currentPrompt = prompt;
            state.promptsCreated++;

            appendLine('<span class="line-success">[ OK ] prompt generated successfully.</span>');
            appendLine('');
            appendLine(`<div class="prompt-output">${escapeHtml(prompt)}</div>`);
            appendLine('');
            appendLine('<span class="line-info">commands:</span> <span class="cmd-hint">save</span> | <span class="cmd-hint">copy</span> | <span class="cmd-hint">download</span>');
            appendLine('<span class="line-dim">type <span class="cmd-hint">new</span> to create another prompt.</span>');

            // Reset
            setTimeout(() => {
                state.step = 1;
                state.data = { objective:'', context:'', audience:'', format:'', tone:'', constraints:[], examples:'' };
            }, 100);
        }

        // =============================================
        // COMMAND IMPLEMENTATIONS
        // =============================================
        function showHelp() {
            appendLine(`
<div class="man-page">
<div class="man-section">
<div class="man-title">NAME</div>
<div class="man-content">promptforge.sh — a robust prompt generator, in terminal form</div>
</div>

<div class="man-section">
<div class="man-title">SYNOPSIS</div>
<div class="man-content"><code>&lt;command&gt;</code> [arguments]</div>
</div>

<div class="man-section">
<div class="man-title">DESCRIPTION</div>
<div class="man-content">
You are using a prompt generator by typing at a prompt. There is no other interface.
This is the entire interface.

Type your answers when asked, and a robust prompt will be generated.
</div>
</div>

<div class="man-section">
<div class="man-title">COMMANDS</div>
<div class="man-content">
  <code>help</code>          Show this help message<br>
  <code>new</code>           Start new prompt session<br>
  <code>save</code>          Save current prompt<br>
  <code>list</code>          List saved prompts<br>
  <code>load [id]</code>     Load a saved prompt<br>
  <code>copy</code>          Copy to clipboard<br>
  <code>download</code>      Download as .txt file<br>
  <code>export</code>        Export all prompts as JSON<br>
  <code>ls</code>            List directory contents<br>
  <code>clear</code>         Clear screen<br>
  <code>readme</code>        Show README<br>
  <code>about</code>         About this system
</div>
</div>

<div class="man-section">
<div class="man-title">EXAMPLES</div>
<div class="man-content">
  user@promptforge:~$ I want a prompt for technical writing<br>
  user@promptforge:~$ save<br>
  user@promptforge:~$ list<br>
  user@promptforge:~$ load 1
</div>
</div>
</div>`);
        }

        function showReadme() {
            appendLine(`
<div class="man-page">
<div class="man-section">
<div class="man-title"># PROMPFORGE.SH</div>
<div class="man-content">
A terminal-style prompt generator inspired by retro.sh and old-school terminals.<br><br>

## WHY TERMINAL?<br>
Because dashboards are overrated. Real engineers use terminals.<br><br>

## FEATURES<br>
- Pure terminal interface (no GUI clutter)<br>
- Robust prompt generation in 5 guided steps<br>
- Local storage persistence<br>
- Export/import functionality<br>
- CRT aesthetic with amber theme<br><br>

## KEYBOARD SHORTCUTS<br>
- Enter: Execute command<br>
- (no other shortcuts needed)<br><br>

## LICENSE<br>
MIT — Use it, break it, fix it, love it.
</div>
</div>
</div>`);
        }

        function showAbout() {
            appendLine(`
<span class="line-info">╔══════════════════════════════════════╗</span>
<span class="line-info">║     PROMPFORGE.SH v3.1.0             ║</span>
<span class="line-info">╠══════════════════════════════════════╣</span>
<span class="line-info">║  Engine: PromptForge Core            ║</span>
<span class="line-info">║  Theme: Amber                        ║</span>
<span class="line-info">║  Status: OPERATIONAL                 ║</span>
<span class="line-info">║  Prompts Created: ${state.promptsCreated.toString().padStart(4)}               ║</span>
<span class="line-info">║  Saved: ${state.savedPrompts.length.toString().padStart(4)}                         ║</span>
<span class="line-info">╚══════════════════════════════════════╝</span>`);
        }

        function newSession() {
            state.step = 1;
            state.data = { objective:'', context:'', audience:'', format:'', tone:'', constraints:[], examples:'' };
            appendLine('<span class="line-success">[ OK ] new session started.</span>');
            appendLine('');
            flow[0].ask();
        }

        function clearScreen() {
            document.getElementById('outputArea').innerHTML = '';
            appendLine('<span class="line-dim">[screen cleared]</span>');
        }

        function listFiles() {
            appendLine(`
<span class="line-info">drwxr-xr-x  2 user staff  4096 Jan 01 00:00 <span class="cmd-hint">./</span></span>
<span class="line-info">drwxr-xr-x  4 user staff  4096 Jan 01 00:00 <span class="cmd-hint">../</span></span>
<span class="line-info">-rw-r--r--  1 user staff   256 Jan 01 00:00 <span class="cmd-hint">README.md</span></span>
<span class="line-info">-rw-r--r--  1 user staff  1024 Jan 01 00:00 <span class="cmd-hint">prompts.json</span> (${state.savedPrompts.length} entries)</span>
<span class="line-info">drwx------  2 user staff  4096 Jan 01 00:00 <span class="cmd-hint">.cache/</span></span>`);
        }

        function savePrompt() {
            if (!state.currentPrompt) {
                appendLine('<span class="line-error">error: nothing to save. generate a prompt first.</span>');
                return;
            }

            const entry = {
                id: state.savedPrompts.length + 1,
                title: state.data.objective.substring(0, 40) || 'untitled',
                content: state.currentPrompt,
                date: new Date().toISOString()
            };

            state.savedPrompts.push(entry);
            localStorage.setItem('pf_prompts', JSON.stringify(state.savedPrompts));

            appendLine(`<span class="line-success">[ OK ] prompt saved as #${entry.id} — "${entry.title}"</span>`);
        }

        function listSaved() {
            if (state.savedPrompts.length === 0) {
                appendLine('<span class="line-dim">no prompts saved yet.</span>');
                return;
            }

            appendLine('<span class="line-info">SAVED PROMPTS:</span>');
            appendLine('');
            state.savedPrompts.forEach(p => {
                appendLine(`  <span class="line-success">#${p.id}</span>  ${p.title}  <span class="line-dim">[${new Date(p.date).toLocaleDateString()}]</span>`);
            });
            appendLine('');
            appendLine('<span class="line-dim">use <span class="cmd-hint">load [id]</span> to view a prompt.</span>');
        }

        function loadPrompt(idStr) {
            const id = parseInt(idStr);
            if (!id || isNaN(id)) {
                appendLine('<span class="line-error">error: specify an id. usage: load [number]</span>');
                return;
            }

            const p = state.savedPrompts.find(x => x.id === id);
            if (!p) {
                appendLine(`<span class="line-error">error: prompt #${id} not found.</span>`);
                return;
            }

            state.currentPrompt = p.content;
            appendLine(`<span class="line-info">[ LOADED ] #${id} — ${p.title}</span>`);
            appendLine('');
            appendLine(`<div class="prompt-output">${escapeHtml(p.content)}</div>`);
            appendLine('');
            appendLine('<span class="line-info">commands:</span> <span class="cmd-hint">copy</span> | <span class="cmd-hint">download</span>');
        }

        function copyPrompt() {
            if (!state.currentPrompt) {
                appendLine('<span class="line-error">error: nothing to copy.</span>');
                return;
            }
            navigator.clipboard.writeText(state.currentPrompt);
            appendLine('<span class="line-success">[ OK ] copied to clipboard.</span>');
        }

        function downloadPrompt() {
            if (!state.currentPrompt) {
                appendLine('<span class="line-error">error: nothing to download.</span>');
                return;
            }
            const blob = new Blob([state.currentPrompt], {type:'text/plain'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `prompt_${Date.now()}.sh.txt`;
            a.click();
            URL.revokeObjectURL(url);
            appendLine('<span class="line-success">[ OK ] downloaded.</span>');
        }

        function exportAll() {
            if (state.savedPrompts.length === 0) {
                appendLine('<span class="line-error">error: nothing to export.</span>');
                return;
            }
            const data = JSON.stringify(state.savedPrompts, null, 2);
            const blob = new Blob([data], {type:'application/json'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `promptforge_backup_${Date.now()}.json`;
            a.click();
            URL.revokeObjectURL(url);
            appendLine(`<span class="line-success">[ OK ] exported ${state.savedPrompts.length} prompts.</span>`);
        }

        // =============================================
        // UTILITIES
        // =============================================
        function appendLine(html, className = '') {
            const div = document.createElement('div');
            div.className = 'output-line ' + className;
            div.innerHTML = html;
            document.getElementById('outputArea').appendChild(div);
        }

        function print(html) {
            appendLine(html);
        }

        function escapeHtml(text) {
            const d = document.createElement('div');
            d.textContent = text;
            return d.innerHTML;
        }

        function scrollToBottom() {
            const el = document.getElementById('outputArea');
            requestAnimationFrame(() => {
                el.scrollTop = el.scrollHeight;
            });
        }
    </script>
</body>
</html>
