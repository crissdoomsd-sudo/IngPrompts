<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>promptforge.sh // CYBER TERMINAL</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-black: #050a05;
            --bg-dark: #0a140a;
            --green-bright: #00ff41;
            --green-neon: #39ff14;
            --green-dim: #00cc33;
            --green-glow: rgba(57, 255, 20, 0.5);
            --cyan-green: #00ffc8;
            --lime-warn: #adff2f;
            --text-white: #e0ffe0;
            --text-gray: #6b9b6b;
            --red-error: #ff3860;
        }

        html, body {
            height: 100%;
            overflow: hidden;
        }

        body {
            font-family: 'JetBrains Mono', 'Fira Code', 'Consolas', monospace;
            background: var(--bg-black);
            color: var(--green-bright);
            font-size: 14px;
            line-height: 1.5;
        }

        /* Efecto scanlines */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(
                0deg,
                transparent,
                transparent 2px,
                rgba(0, 255, 65, 0.02) 2px,
                rgba(0, 255, 65, 0.02) 4px
            );
            pointer-events: none;
            z-index: 9999;
        }

        /* Terminal */
        .terminal {
            display: flex;
            flex-direction: column;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
        }

        /* Status Bar - Cyber Style */
        .status-bar {
            background: linear-gradient(180deg, rgba(0, 255, 65, 0.08) 0%, transparent 100%);
            border-bottom: 1px solid rgba(0, 255, 65, 0.25);
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 13px;
            flex-shrink: 0;
            box-shadow: 0 2px 20px rgba(0, 255, 65, 0.15);
        }

        .status-left {
            color: var(--green-neon);
            font-weight: 600;
            text-shadow: 0 0 10px var(--green-glow);
            letter-spacing: 1px;
        }

        .status-right {
            color: var(--text-gray);
            display: flex;
            gap: 24px;
            font-size: 12px;
        }

        .status-item {
            opacity: 0.85;
        }

        .status-highlight {
            color: var(--green-bright);
            text-shadow: 0 0 8px var(--green-glow);
        }

        .status-time {
            color: var(--green-dim);
            font-variant-numeric: tabular-nums;
        }

        .ai-status {
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .ai-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--red-error);
            animation: pulse-red 2s infinite;
        }

        .ai-dot.connected {
            background: var(--green-neon);
            animation: pulse-green 1.5s infinite;
        }

        @keyframes pulse-red {
            0%, 100% { box-shadow: 0 0 5px var(--red-error); }
            50% { box-shadow: 0 0 15px var(--red-error); }
        }

        @keyframes pulse-green {
            0%, 100% { 
                box-shadow: 0 0 5px var(--green-glow), 0 0 10px var(--green-glow);
                opacity: 1;
            }
            50% { 
                box-shadow: 0 0 15px var(--green-glow), 0 0 25px var(--green-glow), 0 0 35px var(--green-glow);
                opacity: 0.7;
            }
        }

        /* Output Area */
        .output-area {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            padding: 20px 24px;
            scroll-behavior: smooth;
        }

        .output-area::-webkit-scrollbar {
            width: 10px;
        }

        .output-area::-webkit-scrollbar-track {
            background: var(--bg-black);
            border-left: 1px solid rgba(0, 255, 65, 0.1);
        }

        .output-area::-webkit-scrollbar-thumb {
            background: rgba(0, 255, 65, 0.2);
            border-left: 1px solid rgba(0, 255, 65, 0.3);
        }

        .output-area::-webkit-scrollbar-thumb:hover {
            background: rgba(0, 255, 65, 0.35);
        }

        /* Boot Lines */
        .boot-line {
            margin: 3px 0;
            white-space: pre-wrap;
        }

        .boot-ok {
            color: var(--green-bright);
            text-shadow: 0 0 5px rgba(0, 255, 65, 0.4);
        }

        .boot-warn {
            color: var(--lime-warn);
        }

        /* Box Cyber Style */
        .cyber-box {
            border: 1px solid rgba(0, 255, 65, 0.3);
            padding: 20px 24px;
            margin: 24px 0;
            position: relative;
            background: rgba(0, 255, 65, 0.02);
            box-shadow: 
                inset 0 0 30px rgba(0, 255, 65, 0.03),
                0 0 20px rgba(0, 255, 65, 0.08);
        }

        .cyber-box::before,
        .cyber-box::after {
            content: '';
            position: absolute;
            width: 20px;
            height: 20px;
            border-color: var(--green-bright);
            border-style: solid;
        }

        .cyber-box::before {
            top: -1px;
            left: -1px;
            border-width: 2px 0 0 2px;
            box-shadow: -2px -2px 10px rgba(0, 255, 65, 0.3);
        }

        .cyber-box::after {
            bottom: -1px;
            right: -1px;
            border-width: 0 2px 2px 0;
            box-shadow: 2px 2px 10px rgba(0, 255, 65, 0.3);
        }

        .box-title {
            color: var(--green-neon);
            font-weight: 700;
            margin-bottom: 16px;
            font-size: 15px;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 15px var(--green-glow);
        }

        .box-content {
            color: var(--text-white);
            line-height: 1.9;
        }

        .box-content p {
            margin: 8px 0;
        }

        .cmd-hint {
            color: var(--cyan-green);
            font-weight: 600;
            text-shadow: 0 0 8px rgba(0, 255, 200, 0.5);
        }

        /* Input Line */
        .input-line {
            display: flex;
            align-items: center;
            padding: 14px 24px;
            border-top: 1px solid rgba(0, 255, 65, 0.15);
            background: linear-gradient(180deg, rgba(0, 255, 65, 0.03) 0%, transparent 100%);
            flex-shrink: 0;
        }

        .prompt-prefix {
            color: var(--cyan-green);
            margin-right: 10px;
            white-space: nowrap;
            user-select: none;
            font-weight: 500;
            text-shadow: 0 0 8px rgba(0, 255, 200, 0.4);
        }

        .prompt-user {
            color: var(--green-neon);
            font-weight: 700;
        }

        .prompt-path {
            color: var(--text-gray);
        }

        .prompt-symbol {
            color: var(--green-bright);
            margin-right: 12px;
            font-weight: bold;
        }

        .terminal-input {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: var(--green-bright);
            font-family: inherit;
            font-size: inherit;
            caret-color: var(--green-neon);
            text-shadow: 0 0 5px rgba(0, 255, 65, 0.3);
        }

        .terminal-input::placeholder {
            color: rgba(0, 255, 65, 0.25);
        }

        /* Cursor Cyber */
        .cursor-cyber {
            display: inline-block;
            width: 10px;
            height: 18px;
            background: var(--green-neon);
            animation: blink-cursor 0.8s step-end infinite;
            vertical-align: middle;
            margin-left: 3px;
            box-shadow: 0 0 10px var(--green-glow), 0 0 20px var(--green-glow);
        }

        @keyframes blink-cursor {
            0%, 50% { opacity: 1; }
            51%, 100% { opacity: 0; }
        }

        /* Output Lines */
        .output-line {
            margin: 4px 0;
            white-space: pre-wrap;
            word-break: break-word;
        }

        .line-error {
            color: var(--red-error);
            text-shadow: 0 0 8px rgba(255, 56, 96, 0.4);
        }

        .line-success {
            color: var(--green-bright);
            text-shadow: 0 0 8px var(--green-glow);
        }

        .line-info {
            color: var(--cyan-green);
        }

        .line-warn {
            color: var(--lime-warn);
        }

        .line-dim {
            color: var(--text-gray);
        }

        .line-ai {
            color: var(--green-neon);
            border-left: 2px solid var(--green-bright);
            padding-left: 12px;
            margin: 12px 0;
        }

        .line-cmd {
            color: var(--cyan-green);
            font-weight: 600;
        }

        /* AI Response Box */
        .ai-response {
            border: 1px solid rgba(0, 255, 200, 0.25);
            background: rgba(0, 255, 200, 0.03);
            padding: 16px 20px;
            margin: 16px 0;
            position: relative;
            box-shadow: 
                inset 0 0 40px rgba(0, 255, 200, 0.04),
                0 0 30px rgba(0, 255, 200, 0.06);
        }

        .ai-response::before {
            content: '[ GEMINI_RESPONSE ]';
            position: absolute;
            top: -11px;
            left: 16px;
            background: var(--bg-black);
            padding: 0 10px;
            font-size: 11px;
            color: var(--cyan-green);
            letter-spacing: 2px;
            font-weight: 600;
        }

        .ai-response-content {
            color: var(--text-white);
            line-height: 1.8;
            font-size: 13px;
        }

        /* Prompt Output */
        .prompt-output {
            border: 1px solid rgba(0, 255, 65, 0.35);
            background: rgba(0, 255, 65, 0.03);
            padding: 18px 22px;
            margin: 18px 0;
            font-size: 13px;
            line-height: 1.75;
            color: var(--green-bright);
            position: relative;
            box-shadow: 
                inset 0 0 50px rgba(0, 255, 65, 0.04),
                0 0 30px rgba(0, 255, 65, 0.1);
        }

        .prompt-output::before {
            content: '[ PROMPT_GENERADO ]';
            position: absolute;
            top: -11px;
            left: 16px;
            background: var(--bg-black);
            padding: 0 10px;
            font-size: 11px;
            color: var(--green-neon);
            letter-spacing: 2px;
            font-weight: 700;
            text-shadow: 0 0 10px var(--green-glow);
        }

        /* Man Page Style */
        .man-page {
            margin: 18px 0;
        }

        .man-section {
            margin: 16px 0;
        }

        .man-title {
            color: var(--green-neon);
            text-transform: uppercase;
            letter-spacing: 2.5px;
            font-size: 13px;
            margin-bottom: 10px;
            font-weight: 700;
            text-shadow: 0 0 12px var(--green-glow);
        }

        .man-content {
            color: var(--text-white);
            padding-left: 0;
            line-height: 1.8;
        }

        .man-content code {
            color: var(--cyan-green);
            background: rgba(0, 255, 200, 0.08);
            padding: 2px 7px;
            font-family: inherit;
            border-radius: 2px;
        }

        /* Step Indicator */
        .step-indicator {
            color: var(--green-neon);
            font-weight: 700;
            font-size: 13px;
            letter-spacing: 1px;
            margin: 14px 0 10px 0;
            padding: 8px 14px;
            background: rgba(0, 255, 65, 0.05);
            border-left: 3px solid var(--green-bright);
            text-shadow: 0 0 10px var(--green-glow);
        }

        /* Typing Animation */
        .typing-text {
            overflow: hidden;
            animation: typing 0.5s steps(40, end);
        }

        @keyframes typing {
            from { max-height: 0; opacity: 0; }
            to { max-height: 1000px; opacity: 1; }
        }

        /* Selection */
        ::selection {
            background: var(--green-bright);
            color: var(--bg-black);
        }

        /* Responsive */
        @media (max-width: 768px) {
            body {
                font-size: 13px;
            }

            .status-bar {
                padding: 8px 14px;
                font-size: 11px;
                flex-wrap: wrap;
                gap: 8px;
            }

            .status-right {
                gap: 12px;
                font-size: 10px;
            }

            .output-area {
                padding: 14px 16px;
            }

            .input-line {
                padding: 12px 16px;
            }

            .cyber-box {
                padding: 16px 18px;
                margin: 18px 0;
            }

            .box-title {
                font-size: 13px;
            }
        }

        /* Hidden */
        .hidden {
            display: none !important;
        }

        /* Glow effects on hover for interactive elements */
        .interactive:hover {
            text-shadow: 0 0 15px var(--green-glow);
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="terminal">
        <!-- Status Bar -->
        <div class="status-bar">
            <span class="status-left">⬡ promptforge.sh <span style="color:var(--text-gray)">//</span> CYBER_TERMINAL v4.0</span>
            <span class="status-right">
                <span class="status-item">theme: <span class="status-highlight">LECHUGA_CYBER</span></span>
                <span class="status-item ai-status">
                    ia: <span id="aiStatusText">DESCONECTADA</span>
                    <span class="ai-dot" id="aiDot"></span>
                </span>
                <span class="status-item">crt: <span class="status-highlight">ON</span></span>
                <span class="status-time" id="clock">00:00:00</span>
            </span>
        </div>

        <!-- Terminal Output -->
        <div class="output-area" id="outputArea">
            <!-- Content via JS -->
        </div>

        <!-- Input -->
        <div class="input-line">
            <span class="prompt-prefix">
                <span class="prompt-user">cyber</span>@<span class="prompt-user">promptforge</span>:<span class="prompt-path">~</span><span class="prompt-symbol">$</span>
            </span>
            <input 
                type="text" 
                class="terminal-input" 
                id="cmdInput"
                placeholder=""
                autocomplete="off"
                spellcheck="false"
                autofocus
            >
            <span class="cursor-cyber"></span>
        </div>
    </div>

    <script>
        // =============================================
        // ESTADO GLOBAL
        // =============================================
        const state = {
            step: 1,
            totalSteps: 5,
            questionsCount: 0,
            promptsCreated: 0,
            aiConnected: false,
            apiKey: localStorage.getItem('pf_gemini_key') || '',
            data: {
                objetivo: '',
                contexto: '',
                audiencia: '',
                formato: '',
                tono: '',
                restricciones: [],
                ejemplos: ''
            },
            savedPrompts: JSON.parse(localStorage.getItem('pf_prompts') || '[]'),
            currentPrompt: '',
            history: [],
            conversationHistory: []
        };

        // Configuración Gemini
        const GEMINI_CONFIG = {
            endpoint: 'https://generativelanguage.googleapis.com/v1beta/models/gemini-pro:generateContent',
            model: 'gemini-pro'
        };

        // =============================================
        // MENSAJES DE INICIO (BOOT SEQUENCE)
        // =============================================
        const bootMessages = [
            { type: 'ok', text: '[ OK ] inicializando promptforge.sh v4.0 CYBER_EDITION...' },
            { type: 'ok', text: '[ OK ] cargando módulos de ingeniería de prompts...' },
            { type: 'ok', text: '[ OK ] montando /prompts (' + state.savedPrompts.length + ' entradas)' },
            { type: 'ok', text: '[ OK ] montando /templates (15 plantillas)' },
            { type: 'ok', text: '[ OK ] activando subsistema visual LECHUGA_CYBER' },
            { type: 'warn', text: "[ WARN ] IA no conectada (usa 'conectar' + tu API KEY)" },
            { type: 'ok', text: '[ OK ] leyendo historial (' + state.questionsCount + ' comandos)' },
            { type: 'ok', text: '[ OK ] sistema listo. esperando comandos...' }
        ];

        const welcomeBox = `
<div class="cyber-box">
    <div class="box-title">// promptforge.sh — generador de prompts robustos con IA integrada</div>
    <div class="box-content">
        <p><span class="cmd-hint">conectar [tu_api_key]</span> — conectar con Gemini AI</p>
        <p><span class="cmd-hint">ayuda</span> — ver todos los comandos disponibles</p>
        <p><span class="cmd-hint">ls</span> — explorar directorio</p>
        <p><span class="cmd-hint">nuevo</span> — iniciar nueva sesión (o escribe directamente)</p>
        <p><span class="cmd-hint">chat [tu mensaje]</span> — hablar con la IA</p>
        <p><span class="cmd-hint">generar</span> — crear prompt con asistencia de IA</p>
    </div>
</div>`;

        // =============================================
        // FLUJO DE PREGUNTAS
        // =============================================
        const flujoPreguntas = [
            {
                paso: 1,
                titulo: 'PASO 01 — OBJETIVO PRINCIPAL',
                pregunta: () => imprimir(`
<div class="step-indicator">▶ PASO 01 DE 05 — DEFINIENDO OBJETIVO</div>
<div class="man-section">
<div class="man-content">
¿Cuál es el <strong>objetivo principal</strong> de tu prompt?<br><br>
Sé específico sobre:<br>
• ¿Qué quieres que la IA haga exactamente?<br>
• ¿Qué resultado esperas obtener?<br>
• ¿Para qué vas a usar este prompt?<br><br>
<span style="color:var(--green-neon)">[Escribe tu respuesta y presiona ENTER]</span>
</div></div>`)
            },
            {
                paso: 2,
                titulo: 'PASO 02 — CONTEXTO Y AUDIENCIA',
                pregunta: () => imprimir(`
<div class="step-indicator">▶ PASO 02 DE 05 — CONTEXTO Y AUDIENCIA</div>
<div class="man-section">
<div class="man-content">
Define el contexto y la audiencia objetivo:<br><br>
• ¿Quién es la audiencia? (edad, nivel de experiencia, intereses)<br>
• ¿Qué antecedentes debe conocer la IA?<br>
• ¿Algún dominio o campo específico?<br><br>
<span style="color:var(--green-neon)">[Continúa describiendo...]</span>
</div></div>`)
            },
            {
                paso: 3,
                titulo: 'PASO 03 — FORMATO Y ESTILO',
                pregunta: () => imprimir(`
<div class="step-indicator">▶ PASO 03 DE 05 — FORMATO Y ESTILO</div>
<div class="man-section">
<div class="man-content">
Especifica el formato y tono de salida:<br><br>
• Formato deseado: lista, párrafos, código, tabla, JSON...<br>
• Tono: formal, casual, técnico, persuasivo, creativo...<br>
• ¿Algún estilo de escritura particular?<br><br>
<span style="color:var(--green-neon)">[Describe las especificaciones...]</span>
</div></div>`)
            },
            {
                paso: 4,
                titulo: 'PASO 04 — RESTRICCIONES',
                pregunta: () => imprimir(`
<div class="step-indicator">▶ PASO 04 DE 05 — RESTRICCIONES Y DETALLES</div>
<div class="man-section">
<div class="man-content">
Establece limitaciones y detalles finales:<br><br>
• Longitud máxima/mínima<br>
• Palabras o conceptos a evitar<br>
• Ejemplos de referencia (entrada/salida)<br>
• Instrucciones especiales adicionales<br><br>
<span style="color:var(--green-neon)">[Agrega restricciones...]</span>
</div></div>`)
            },
            {
                paso: 5,
                accion: 'generar'
            }
        ];

        // =============================================
        // INICIALIZACIÓN
        // =============================================
        document.addEventListener('DOMContentLoaded', () => {
            secuenciaInicio();
            iniciarReloj();
            
            document.getElementById('cmdInput').addEventListener('keydown', e => {
                if (e.key === 'Enter') ejecutarComando();
            });
        });

        function secuenciaInicio() {
            let i = 0;

            function mostrarSiguiente() {
                if (i < bootMessages.length) {
                    const msg = bootMessages[i];
                    const clase = msg.type === 'ok' ? 'boot-ok' : 'boot-warn';
                    agregarLinea(`<span class="${clase}">${msg.text}</span>`, 'boot-line');
                    i++;
                    setTimeout(mostrarSiguiente, 70 + Math.random() * 50);
                } else {
                    setTimeout(() => {
                        agregarLinea(welcomeBox);
                        agregarLinea('');
                        if (state.apiKey) {
                            conectarAutomaticamente();
                        } else {
                            flujoPreguntas[0].pregunta();
                        }
                        scrollAlFinal();
                    }, 300);
                }
            }

            mostrarSiguiente();
        }

        function iniciarReloj() {
            function actualizar() {
                const ahora = new Date();
                const h = String(ahora.getHours()).padStart(2, '0');
                const m = String(ahora.getMinutes()).padStart(2, '0');
                const s = String(ahora.getSeconds()).padStart(2, '0');
                document.getElementById('clock').textContent = `${h}:${m}:${s}`;
            }
            actualizar();
            setInterval(actualizar, 1000);
        }

        function conectarAutomaticamente() {
            state.aiConnected = true;
            actualizarEstadoAI(true);
            agregarLinea('<span class="line-success">[ OK ] reconectado automáticamente con Gemini (key guardada)</span>');
            agregarLinea('');
            flujoPreguntas[0].pregunta();
        }

        function actualizarEstadoAI(conectado) {
            state.aiConnected = conectado;
            const dot = document.getElementById('aiDot');
            const text = document.getElementById('aiStatusText');
            
            if (conectado) {
                dot.classList.add('connected');
                text.textContent = 'CONECTADA';
                text.style.color = 'var(--green-neon)';
            } else {
                dot.classList.remove('connected');
                text.textContent = 'DESCONECTADA';
                text.style.color = 'var(--red-error)';
            }
        }

        // =============================================
        // EJECUCIÓN DE COMANDOS
        // =============================================
        function ejecutarComando() {
            const input = document.getElementById('cmdInput');
            const cmd = input.value.trim();
            if (!cmd) return;

            // Mostrar comando escrito
            agregarLinea(`<span class="prompt-prefix"><span class="prompt-user">cyber</span>@<span class="prompt-user">promptforge</span>:<span class="prompt-path">~</span><span class="prompt-symbol">$</span></span>${escaparHtml(cmd)}`);
            
            state.history.push(cmd);
            state.questionsCount++;

            input.value = '';

            procesarComando(cmd);
            scrollAlFinal();
        }

        async function procesarComando(cmd) {
            const c = cmd.toLowerCase().trim();

            // Comandos del sistema
            if (c === 'ayuda' || c === 'help' || c === '--help' || c === '-h') {
                mostrarAyuda();
                return;
            }
            if (c === 'limpiar' || c === 'clear' || c === 'cls') {
                limpiarPantalla();
                return;
            }
            if (c === 'nuevo' || c === 'reset' || c === 'new') {
                nuevaSesion();
                return;
            }
            if (c === 'ls' || c === 'dir') {
                listarArchivos();
                return;
            }
            if (c === 'readme' || c === 'cat readme.md') {
                mostrarReadme();
                return;
            }
            
            // Comandos de IA
            if (c.startsWith('conectar ') || c.startsWith('connect ')) {
                await conectarAI(c.split(' ').slice(1).join(' '));
                return;
            }
            if (c.startsWith('chat ') || c.startsWith('hablar ')) {
                await chatConAI(cmd.substring(cmd.indexOf(' ') + 1));
                return;
            }
            if (c === 'desconectar' || c === 'disconnect') {
                desconectarAI();
                return;
            }
            if (c === 'estado' || c === 'status') {
                mostrarEstado();
                return;
            }

            // Comandos de prompts
            if (c === 'guardar' || c === 'save') {
                guardarPrompt();
                return;
            }
            if (c === 'lista' || c === 'list' || c === 'saved') {
                listarGuardados();
                return;
            }
            if (c.startsWith('cargar ') || c.startsWith('load ')) {
                cargarPrompt(c.split(' ')[1]);
                return;
            }
            if (c === 'copiar' || c === 'copy' || c === 'cp') {
                copiarPrompt();
                return;
            }
            if (c === 'descargar' || c === 'download' || c === 'dl') {
                descargarPrompt();
                return;
            }
            if (c === 'exportar' || c === 'export') {
                exportarTodo();
                return;
            }
            if (c === 'about' || c === 'version' || c === '-v' || c === '--version') {
                mostrarAbout();
                return;
            }
            if (c === '' || c === 'exit' || c === 'quit' || c === 'salir') {
                agregarLinea('<span class="line-dim">usa Ctrl+W para cerrar esta pestaña. o quédate para siempre.</span>');
                return;
            }

            // Si no es comando conocido, tratar como respuesta
            await manejarRespuesta(cmd);
        }

        async function conectarAI(apiKey) {
            if (!apiKey || apiKey.length < 10) {
                agregarLinea('<span class="line-error">error: se requiere una API Key válida de Gemini.</span>');
                agregarLinea('<span class="line-dim">obtén una gratis en: https://aistudio.google.com/app/apikey</span>');
                return;
            }

            state.apiKey = apiKey;
            localStorage.setItem('pf_gemini_key', apiKey);

            agregarLinea('<span class="line-info">[ ... ] conectando con Gemini AI...</span>');

            // Probar conexión
            try {
                const respuesta = await llamarGemini('Responde solo con: CONEXIÓN EXITOSA', []);
                
                if (respuesta.includes('CONEXIÓN EXITOSA') || respuesta.includes('exitosa') || respuesta.includes('éxito')) {
                    actualizarEstadoAI(true);
                    agregarLinea('<span class="line-success">[ OK ] ¡Conexión establecida con Gemini!</span>');
                    agregarLinea('<span class="line-info">[ INFO ] IA lista para asistir en generación de prompts</span>');
                    agregarLinea('');
                    agregarLinea('<span class="line-dim">comandos disponibles:</span> <span class="cmd-hint">chat [mensaje]</span> | <span class="cmd-hint">generar</span> | <span class="cmd-hint">desconectar</span>');
                } else {
                    throw new Error('Respuesta inesperada');
                }
            } catch (error) {
                actualizarEstadoAI(false);
                agregarLinea('<span class="line-error">error: no se pudo conectar. verifica tu API Key.</span>');
                agregarLinea('<span class="line-dim">detalle: ' + error.message + '</span>');
            }
        }

        async function chatConAI(mensaje) {
            if (!state.aiConnected) {
                agregarLinea('<span class="line-error">error: IA no conectada. usa <span class="cmd-hint">conectar [tu_api_key]</span> primero.</span>');
                return;
            }

            if (!mensaje || mensaje.trim().length === 0) {
                agregarLinea('<span class="line-error">error: escribe un mensaje. uso: <span class="cmd-hint">chat [tu mensaje]</span></span>');
                return;
            }

            agregarLinea(`<span class="line-ai"><span style="color:var(--cyan-green)">[TÚ]</span> ${escaparHtml(mensaje)}</span>`);
            agregarLinea('<span class="line-info">[ GEMINI ] pensando...</span>');

            try {
                const respuesta = await llamarGemini(mensaje, state.conversationHistory.slice(-10));
                
                state.conversationHistory.push(
                    { role: 'user', parts: [{ text: mensaje }] },
                    { role: 'model', parts: [{ text: respuesta }] }
                );

                agregarLinea('');
                agregarLinea(`<div class="ai-response"><div class="ai-response-content">${formatearRespuestaAI(respuesta)}</div></div>`);
                agregarLinea('');

            } catch (error) {
                agregarLinea('<span class="line-error">error al comunicarse con Gemini: ' + error.message + '</span>');
            }
        }

        async function llamarGemini(prompt, historial = []) {
            const url = `${GEMINI_CONFIG.endpoint}?key=${state.apiKey}`;
            
            const requestBody = {
                contents: [
                    ...historial,
                    {
                        role: 'user',
                        parts: [{ text: prompt }]
                    }
                ],
                generationConfig: {
                    temperature: 0.8,
                    topK: 40,
                    topP: 0.95,
                    maxOutputTokens: 2048,
                },
                safetySettings: [
                    { category: 'HARM_CATEGORY_HARASSMENT', threshold: 'BLOCK_NONE' },
                    { category: 'HARM_CATEGORY_HATE_SPEECH', threshold: 'BLOCK_NONE' },
                    { category: 'HARM_CATEGORY_SEXUALLY_EXPLICIT', threshold: 'BLOCK_NONE' },
                    { category: 'HARM_CATEGORY_DANGEROUS_CONTENT', threshold: 'BLOCK_NONE' }
                ]
            };

            const response = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(requestBody)
            });

            if (!response.ok) {
                const errorData = await response.json();
                throw new Error(errorData.error?.message || 'Error en la API');
            }

            const data = await response.json();
            return data.candidates?.[0]?.content?.parts?.[0]?.text || 'Sin respuesta';
        }

Responde en ESPAÑOL de forma muy breve (máximo 2 líneas), confirmando que entendiste y dando un pequeño consejo para el siguiente paso.`;

        async function generarPromptConIA() {

            let promptBase = `# ROL\n`;
            promptBase += `Eres un asistente de IA experto especializado en: ${d.objetivo}\n\n`;
            promptBase += `# OBJETIVO PRINCIPAL\n${d.objetivo}\n\n`;
            
            if (d.contexto) {
                promptBase += `# CONTEXTO Y AUDIENCIA\n${d.contexto}\n\n`;
            }
            
            if (d.formato) {
                promptBase += `# FORMATO Y ESTILO\nFormato: ${d.formato}\n\n`;
            }
            
            if (d.restricciones.length > 0) {
                promptBase += `# RESTRICCIONES\n`;
                d.restricciones.forEach(r => promptBase += `- ${r}\n`);
                promptBase += `\n`;
            }
            
            promptBase += `# PROTOCOLO DE EJECUCIÓN\n`;
            promptBase += `1. Analizar la solicitud detalladamente\n`;
            promptBase += `2. Considerar todo el contexto proporcionado\n`;

            promptBase += `5. Entregar resultado pulido\n\n`;
            promptBase += `--- Ejecutar ahora ---`;

            // Si hay IA, mejorar el prompt
            if (state.aiConnected) {

                try {
                    const instruccionIA = `Eres un experto en ingeniería de prompts. Tengo esta información para crear un prompt robusto:

OBJETIVO: ${d.objetivo}
CONTEXTO: ${d.contexto || 'No especificado'}

Genera un PROMPT PROFESIONAL Y OPTIMIZADO en inglés (para mejor rendimiento con IAs) que incluya:

3. Formato de salida estructurado
4. Ejemplos si aplica
5. Criterios de calidad

Responde SOLO con el prompt generado, sin explicaciones adicionales.`;

                    const promptMejorado = await llamarGemini(instruccionIA, []);
                    state.currentPrompt = promptMejorado;

                    agregarLinea('<span class="line-warn">[ WARN ] usando modo plantilla (IA no disponible)</span>');

            const blob = new Blob([data], {type:'application/json'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `promptforge_backup_${Date.now()}.json`;
            a.click();
            URL.revokeObjectURL(url);
            agregarLinea(`<span class="line-success">[ OK ] exportados ${state.savedPrompts.length} prompts ✓</span>`);
        }

        // =============================================
        // UTILIDADES
        // =============================================
        function agregarLinea(html, className = '') {
            const div = document.createElement('div');
            div.className = 'output-line ' + className;
            div.innerHTML = html;
            document.getElementById('outputArea').appendChild(div);
        }

        function imprimir(html) {
            agregarLinea(html);
        }

        function escaparHtml(texto) {
            const d = document.createElement('div');
            d.textContent = texto;
            return d.innerHTML;
        }

        function formatearRespuestaAI(texto) {
            return escaparHtml(texto)
                .replace(/\*\*(.*?)\*\*/g, '<strong style="color:var(--green-neon)">$1</strong>')
                .replace(/`(.*?)`/g, '<code style="color:var(--cyan-green);background:rgba(0,255,200,0.1);padding:1px 5px;">$1</code>')
                .replace(/\n/g, '<br>');
        }

        function scrollAlFinal() {
            const el = document.getElementById('outputArea');
            requestAnimationFrame(() => {
                el.scrollTop = el.scrollHeight;
            });
        }
    </script>
</body>
</html>
